<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe - SmartHR</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-key-fill text-warning" style="font-size: 3rem;"></i>
                            <h3 class="mt-3">Réinitialiser le mot de passe</h3>
                            <p class="text-muted">Entrez votre nouveau mot de passe</p>
                        </div>

                        <!-- Messages d'erreur -->
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Formulaire -->
                        <form th:action="@{/reset-password}" method="post">
                            <!-- Token caché -->
                            <input type="hidden" name="token" th:value="${token}">

                            <!-- Nouveau mot de passe -->
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">
                                    <i class="bi bi-lock"></i> Nouveau mot de passe
                                </label>
                                <input type="password" 
                                       class="form-control" 
                                       id="newPassword" 
                                       name="newPassword" 
                                       placeholder="Entrez votre nouveau mot de passe"
                                       required
                                       minlength="8">
                                <div class="form-text">
                                    Le mot de passe doit contenir au moins 8 caractères.
                                </div>
                            </div>

                            <!-- Confirmer le mot de passe -->
                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label">
                                    <i class="bi bi-lock-fill"></i> Confirmer le mot de passe
                                </label>
                                <input type="password" 
                                       class="form-control" 
                                       id="confirmPassword" 
                                       name="confirmPassword" 
                                       placeholder="Confirmez votre nouveau mot de passe"
                                       required
                                       minlength="8">
                            </div>

                            <!-- Bouton -->
                            <button type="submit" class="btn btn-warning w-100 mb-3">
                                <i class="bi bi-check-circle"></i> Réinitialiser le mot de passe
                            </button>
                        </form>

                        <div class="text-center">
                            <a th:href="@{/login}" class="text-decoration-none">
                                <i class="bi bi-arrow-left"></i> Retour à la connexion
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
