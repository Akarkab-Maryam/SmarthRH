# ========================================
# CONFIGURATION SERVEUR
# ========================================
server.port=${PORT:8080}
spring.application.name=SmartHR

# ========================================
# CONFIGURATION BASE DE DONNÉES MySQL
# ========================================
#spring.datasource.url=jdbc:mysql://localhost:3306/smarthr_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# ========================================
# CONFIGURATION JPA / HIBERNATE
# ========================================
# Ne pas créer/modifier les tables automatiquement (on a déjà la BDD)
spring.jpa.hibernate.ddl-auto=none

# Afficher les requêtes SQL (utile pour debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# NE PAS spécifier le dialect (Hibernate le détecte automatiquement)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect ← SUPPRIMÉ

# Désactiver open-in-view (meilleure pratique)
spring.jpa.open-in-view=false

# ========================================
# CONFIGURATION THYMELEAF
# ========================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
# Ne pas vérifier si les templates existent au démarrage
spring.thymeleaf.check-template-location=false

# ========================================
# CONFIGURATION UPLOAD FICHIERS
# ========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# CONFIGURATION LOGGING (Réduire les warnings)
# ========================================
logging.level.com.smarthr=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
# Masquer les warnings de dépréciation Hibernate
logging.level.org.hibernate.orm.deprecation=ERROR
# Masquer les warnings Spring Security auto-config
logging.level.org.springframework.boot.autoconfigure.security=ERROR

# ========================================
# DÉSACTIVER TEMPORAIREMENT SPRING SECURITY
